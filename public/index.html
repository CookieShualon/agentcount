<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MCP Counter</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #111318;
        color: #f8fafc;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(79, 70, 229, 0.35), transparent 34rem),
          linear-gradient(135deg, #111318, #181b23 60%, #101114);
      }

      main {
        width: min(34rem, calc(100vw - 2rem));
        padding: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 1.5rem;
        background: rgba(17, 19, 24, 0.76);
        box-shadow: 0 1.5rem 5rem rgba(0, 0, 0, 0.34);
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 0.75rem;
        color: #a5b4fc;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 8vw, 4.5rem);
        line-height: 0.95;
      }

      .counter {
        display: block;
        margin: 1.5rem 0;
        color: #facc15;
        font-size: clamp(5rem, 24vw, 10rem);
        font-weight: 900;
        line-height: 0.9;
        letter-spacing: -0.08em;
      }

      p {
        margin: 0;
        color: #cbd5e1;
        font-size: 1rem;
        line-height: 1.6;
      }

      code {
        color: #fde68a;
        font-family: "SFMono-Regular", Consolas, monospace;
      }

      .status {
        margin-top: 1.5rem;
        color: #94a3b8;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Live MCP counter</p>
      <h1>Call the MCP tool</h1>
      <strong id="counter" class="counter">0</strong>
      <p>Every call to <code>increment_counter</code> updates this page in real time.</p>
      <p id="status" class="status">Connecting...</p>
    </main>

    <script>
      const counter = document.querySelector("#counter");
      const status = document.querySelector("#status");

      async function loadCurrentCounter() {
        const response = await fetch("/api/counter");
        const data = await response.json();
        counter.textContent = data.counter;
      }

      const events = new EventSource("/events");

      events.addEventListener("open", () => {
        status.textContent = "Connected to the MCP server.";
      });

      events.addEventListener("counter", (event) => {
        const data = JSON.parse(event.data);
        counter.textContent = data.counter;
      });

      events.addEventListener("error", () => {
        status.textContent = "Disconnected. Reconnecting...";
      });

      loadCurrentCounter().catch(() => {
        status.textContent = "Could not load the counter.";
      });
    </script>
  </body>
</html>
